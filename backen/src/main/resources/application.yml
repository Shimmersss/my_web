server:
  port: 8080

spring:
  datasource:
    # 使用 H2 内存数据库，开箱即用，不需要安装 MySQL
    url: jdbc:h2:mem:webdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

zotero:
  # 在 https://www.zotero.org/settings/keys 申请
  api-key: ${ZOTERO_API_KEY:}
  # 在 https://www.zotero.org/settings/keys 顶部可见
  user-id: ${ZOTERO_USER_ID:}
  base-url: https://api.zotero.org
