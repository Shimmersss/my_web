server:
  port: 8080

spring:
  datasource:
    # 使用 H2 内存数据库，开箱即用，不需要安装 MySQL
    url: jdbc:h2:mem:webdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

zotero:
  # 在 https://www.zotero.org/settings/keys 申请
  api-key: ${ZOTERO_API_KEY:}
  # 在 https://www.zotero.org/settings/keys 顶部可见
  user-id: ${ZOTERO_USER_ID:}
  base-url: https://api.zotero.org

admin:
  # 后台管理密钥，用于管理 GitHub 开源项目展示列表
  key: ${ADMIN_KEY:change-me}

llm:
  # Anthropic Messages API（支持 Claude 模型）
  api-url: ${LLM_API_URL:https://token-plan-cn.xiaomimimo.com/anthropic}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:mimo-v2.5-pro}
  max-tokens: ${LLM_MAX_TOKENS:8192}
  # 每段文本最大字符数，超长段落会按句号拆分后分批翻译
  chunk-size: ${LLM_CHUNK_SIZE:6000}

babeldoc:
  # 排版版 PDF 由 BabelDOC CLI 生成；首次运行 uvx 会自动下载运行时和模型资源
  enabled: ${BABELDOC_ENABLED:true}
  command: ${BABELDOC_COMMAND:uv run --with babeldoc python}
  openai-base-url: ${BABELDOC_OPENAI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
  openai-api-key: ${BABELDOC_OPENAI_API_KEY:${LLM_API_KEY:}}
  openai-model: ${BABELDOC_OPENAI_MODEL:mimo-v2.5-pro}
  timeout-seconds: ${BABELDOC_TIMEOUT_SECONDS:21600}
  qps: ${BABELDOC_QPS:4}
  resource-cgroup-limit-mi-b: ${BABELDOC_RESOURCE_CGROUP_LIMIT_MIB:2600}
  resource-min-available-mi-b: ${BABELDOC_RESOURCE_MIN_AVAILABLE_MIB:400}
  resource-max-swap-used-mi-b: ${BABELDOC_RESOURCE_MAX_SWAP_USED_MIB:1200}

translation:
  # 2 核 / 4 GB 服务器只运行一个 BabelDOC 子进程，结果落盘避免长期占用 JVM 堆
  storage-dir: ${TRANSLATION_STORAGE_DIR:../.run/translation-tasks}
  max-history: ${TRANSLATION_MAX_HISTORY:5}
  queue-capacity: ${TRANSLATION_QUEUE_CAPACITY:5}
  max-qps: ${TRANSLATION_MAX_QPS:4}
  stable-qps: ${TRANSLATION_STABLE_QPS:2}

ppt-generation:
  # 公开 PPT 生成入口保持资源保守：单 worker、有界队列、文件落盘
  storage-dir: ${PPT_GENERATION_STORAGE_DIR:../.run/ppt-generation-tasks}
  max-history: ${PPT_GENERATION_MAX_HISTORY:5}
  queue-capacity: ${PPT_GENERATION_QUEUE_CAPACITY:3}
  max-prompt-chars: ${PPT_GENERATION_MAX_PROMPT_CHARS:8000}
  max-paper-bytes: ${PPT_GENERATION_MAX_PAPER_BYTES:31457280}
  max-template-bytes: ${PPT_GENERATION_MAX_TEMPLATE_BYTES:31457280}
  max-paper-text-chars: ${PPT_GENERATION_MAX_PAPER_TEXT_CHARS:28000}
  max-extracted-images: ${PPT_GENERATION_MAX_EXTRACTED_IMAGES:8}
  max-vision-images: ${PPT_GENERATION_MAX_VISION_IMAGES:8}
  llm-max-tokens: ${PPT_GENERATION_LLM_MAX_TOKENS:16384}
  vision-max-tokens: ${PPT_GENERATION_VISION_MAX_TOKENS:4096}
  vision-model: ${PPT_GENERATION_VISION_MODEL:mimo-v2.5}
  timeout-seconds: ${PPT_GENERATION_TIMEOUT_SECONDS:900}
  node-command: ${PPT_GENERATION_NODE_COMMAND:node}
  runner-script: ${PPT_GENERATION_RUNNER_SCRIPT:./scripts/pptx-generator/generate_deck.mjs}

openclaw:
  # 后端通过本机 CLI 访问 Gateway，凭证不会暴露给浏览器
  command: ${OPENCLAW_COMMAND:./scripts/openclaw_compat.sh}
  session-key: ${OPENCLAW_SESSION_KEY:main}
  timeout-seconds: ${OPENCLAW_TIMEOUT_SECONDS:30}
  # 2 核服务器限制同时启动的 Node CLI 数量，并缓存高频只读调用
  max-concurrent-calls: ${OPENCLAW_MAX_CONCURRENT_CALLS:2}
  history-cache-millis: ${OPENCLAW_HISTORY_CACHE_MILLIS:1000}
  sessions-cache-millis: ${OPENCLAW_SESSIONS_CACHE_MILLIS:5000}
  models-cache-millis: ${OPENCLAW_MODELS_CACHE_MILLIS:60000}
  commands-cache-millis: ${OPENCLAW_COMMANDS_CACHE_MILLIS:300000}
