server:
  port: 8080

spring:
  datasource:
    # 使用 H2 内存数据库，开箱即用，不需要安装 MySQL
    url: jdbc:h2:mem:webdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

zotero:
  # 在 https://www.zotero.org/settings/keys 申请
  api-key: ${ZOTERO_API_KEY:}
  # 在 https://www.zotero.org/settings/keys 顶部可见
  user-id: ${ZOTERO_USER_ID:}
  base-url: https://api.zotero.org

admin:
  # 后台管理密钥，用于管理 GitHub 开源项目展示列表
  key: ${ADMIN_KEY:change-me}

llm:
  # Anthropic Messages API（支持 Claude 模型）
  api-url: ${LLM_API_URL:https://token-plan-cn.xiaomimimo.com/anthropic}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:mimo-v2.5-pro}
  max-tokens: ${LLM_MAX_TOKENS:8192}
  # 每段文本最大字符数，超长段落会按句号拆分后分批翻译
  chunk-size: ${LLM_CHUNK_SIZE:6000}

babeldoc:
  # 排版版 PDF 由 BabelDOC CLI 生成；首次运行 uvx 会自动下载运行时和模型资源
  enabled: ${BABELDOC_ENABLED:true}
  command: ${BABELDOC_COMMAND:uv run --with babeldoc python}
  openai-base-url: ${BABELDOC_OPENAI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
  openai-api-key: ${BABELDOC_OPENAI_API_KEY:${LLM_API_KEY:}}
  openai-model: ${BABELDOC_OPENAI_MODEL:mimo-v2.5-pro}
  timeout-seconds: ${BABELDOC_TIMEOUT_SECONDS:1800}
  qps: ${BABELDOC_QPS:8}

openclaw:
  # 后端通过本机 CLI 访问 Gateway，凭证不会暴露给浏览器
  command: ${OPENCLAW_COMMAND:openclaw}
  session-key: ${OPENCLAW_SESSION_KEY:main}
  timeout-seconds: ${OPENCLAW_TIMEOUT_SECONDS:30}
