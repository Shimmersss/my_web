<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片占位符</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    .placeholder {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #1890ff;
      margin: 0 0 20px 0;
    }
    p {
      color: #666;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="placeholder">
    <h1>📷 图片占位符</h1>
    <p>请在项目中替换实际的图片资源</p>
    <p>建议将图片放置在 src/assets/images/ 目录下</p>
    <p>或使用 CDN 服务获取图片</p>
  </div>
</body>
</html>
